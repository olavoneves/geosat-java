# ============================================================
#  GEOSAT — Docker Compose
#  Servicos: Oracle DB + API Java Spring Boot
#  Variaveis sensiveis no arquivo .env
# ============================================================

services:

  # --------------------------------------------------------
  #  BANCO DE DADOS ORACLE
  # --------------------------------------------------------
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-geosat
    env_file: .env
    environment:
      - ORACLE_PASSWORD=${ORACLE_PASSWORD}
      - APP_USER=${APP_USER}
      - APP_USER_PASSWORD=${APP_USER_PASSWORD}
      - ORACLE_DATABASE=${ORACLE_DATABASE}
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
    networks:
      - geosat-network
    mem_limit: 2g
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  # --------------------------------------------------------
  #  API JAVA SPRING BOOT
  # --------------------------------------------------------
  api-java:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-geosat
    env_file: .env
    environment:
      - DB_GST_URL=jdbc:oracle:thin:@oracle-db:1521/${ORACLE_DATABASE}
      - DB_GST_USERNAME=${APP_USER}
      - DB_GST_PASSWORD=${APP_USER_PASSWORD}
      - GEOSAT_AUTH_SECRET=${GEOSAT_AUTH_SECRET}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    ports:
      - "8080:8080"
    networks:
      - geosat-network
    mem_limit: 1g
    depends_on:
      oracle-db:
        condition: service_healthy
    restart: unless-stopped

# --------------------------------------------------------
#  VOLUME NOMEADO (persistencia dos dados do Oracle)
# --------------------------------------------------------
volumes:
  oracle-data:

# --------------------------------------------------------
#  REDE DOCKER
# --------------------------------------------------------
networks:
  geosat-network:
